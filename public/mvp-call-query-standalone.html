<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mvp WP Call Query — Düğün.com</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8f9fb;color:#18181b;font-size:14px}
.topbar{background:#fff;border-bottom:1px solid #e4e4e7;padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.topbar h1{font-size:17px;font-weight:700;color:#e6197d}
.topbar .sub{font-size:12px;color:#a1a1aa}
.wrap{max-width:1180px;margin:0 auto;padding:20px 24px 60px}
.card{background:#fff;border:1px solid #e4e4e7;border-radius:12px;padding:18px;margin-bottom:16px}
#b-top{overflow-x:auto}
.sub-td{overflow-x:auto}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.ct{font-size:14px;font-weight:700;color:#18181b}
.note{font-size:11px;color:#a1a1aa}
.stat-grid{display:flex;gap:12px;flex-wrap:wrap}
.stat{background:#f8fafc;border:1px solid #e4e4e7;border-radius:8px;padding:10px 16px;text-align:center;min-width:120px;flex:1}
.stat .v{font-size:20px;font-weight:800;color:#e6197d}
.stat .l{font-size:10.5px;color:#71717a;margin-top:2px}
.chip{display:inline-flex;padding:4px 11px;border-radius:14px;font-size:11px;cursor:pointer;font-weight:600;background:#f4f4f5;color:#52525b;border:1px solid #e4e4e7;user-select:none;margin-right:4px}
.chip.on{background:#e6197d;color:#fff;border-color:#e6197d}
table{width:100%;border-collapse:collapse}
th{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:#71717a;text-align:left;padding:6px 8px;border-bottom:1px solid #e4e4e7;white-space:nowrap}
td{padding:7px 8px;border-bottom:1px solid #f4f4f5;font-size:12.5px}
.num{text-align:right;font-variant-numeric:tabular-nums}
.empty{color:#a1a1aa;font-size:12px;padding:14px;text-align:center}
.crow{cursor:pointer}
.crow:hover{background:#fdf5f9}
.crow.open{background:#fdf0f6}
.caret{display:inline-block;width:12px;color:#e6197d;font-weight:700}
.sub-td{background:#fafafa;padding:0 8px 10px 30px}
.sub-td table{background:#fff;border:1px solid #e4e4e7;border-radius:8px;overflow:hidden}
.sub-td th{font-size:9.5px;background:#f8fafc}
.sub-td td{font-size:11.5px;padding:5px 8px}
.bar{height:6px;border-radius:3px;background:#e6197d;display:inline-block;vertical-align:middle}
select{padding:5px 10px;border:1px solid #e4e4e7;border-radius:6px;font-size:12px;color:#374151;background:#fff;cursor:pointer}
.flabel{font-size:11px;font-weight:600;color:#71717a;text-transform:uppercase;letter-spacing:.5px}
</style>
<link rel="stylesheet" href="/panel-theme.css">
</head>
<body>
<div class="topbar">
  <h1>Mvp WP Call Query</h1>
  <span class="sub" id="freshness">Yükleniyor…</span>
</div>
<div class="wrap">

  <div class="card" style="padding:12px 18px">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span class="flabel">Sözleşme Bitiş Ayı</span>
      <select id="f-ay" onchange="MVP.setAy(this.value)"><option value="">Tüm aylar</option></select>
      <span id="f-info" class="note" style="margin-left:6px"></span>
    </div>
    <div class="note" style="margin-top:8px">
      Aktif providerlar = Dashboard_Firma en güncel <code>load_date</code> snapshot'ı.
    </div>
  </div>

  <div class="card">
    <div class="card-head"><span class="ct">📌 Özet</span><span class="note" id="ozet-note"></span></div>
    <div class="stat-grid" id="b-ozet"><div class="empty">Yükleniyor…</div></div>
  </div>

  <div class="card">
    <div class="card-head">
      <span class="ct">👑 En Çok Ödeyen 20 Müşteri</span>
      <span class="note">satıra tıkla → firmalar (provider) açılır</span>
    </div>
    <div id="b-top"><div class="empty">Yükleniyor…</div></div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────────────────────────────────
// Mvp WP Call Query
// Kaynak: /api/mvp-call-query/data → Dashboard_Firma (Providers-PY "Firmalar"
// objesi 4a681953…, en yeni load_date = aktif providerlar).
//
// MÜŞTERİ ≠ FİRMA: bir müşterinin (Müşteri İD) birden çok firması (RÇİ) olabilir.
// Üst tablo MÜŞTERİ kırılımı; açılır alt tablo o müşterinin PROVIDER'ları.
// ─────────────────────────────────────────────────────────────────────────

var MVP = { rows: [], ay: '', open: {} };

// "11.332,50" / "11332.5" / 11332 → 11332.5 (TR binlik-nokta + ondalık-virgül güvenli)
function num(v) {
  if (typeof v === 'number') return isFinite(v) ? v : 0;
  var s = String(v == null ? '' : v).trim();
  if (!s || s === '-') return 0;
  s = s.replace(/[^\d,.\-]/g, '');
  if (s.indexOf(',') >= 0) {
    // Virgül varsa ondalıktır → noktalar binlik ayracı ("11.332,50" → 11332.50)
    s = s.replace(/\./g, '').replace(',', '.');
  } else if (s.indexOf('.') >= 0) {
    // Virgül yok: noktadan sonraki HER grup tam 3 hane ise TR binlik ayracı
    // ("12.000" → 12000, "1.234.567" → 1234567); değilse ondalık ("11332.5").
    var g = s.split('.');
    var thousands = g.length > 1 && g.slice(1).every(function (x) { return /^\d{3}$/.test(x); });
    if (thousands) s = g.join('');
  }
  var n = parseFloat(s);
  return isFinite(n) ? n : 0;
}

// Bitiş Tarihi → "YYYY-MM". Desteklenen: YYYY-MM-DD, DD.MM.YYYY, DD/MM/YYYY, Excel seri no.
function ayOf(v) {
  if (v == null || v === '') return '';
  if (typeof v === 'number' && v > 20000 && v < 80000) { // Excel seri (1899-12-30 epoch)
    var d = new Date(Date.UTC(1899, 11, 30) + v * 86400000);
    return d.getUTCFullYear() + '-' + String(d.getUTCMonth() + 1).padStart(2, '0');
  }
  var s = String(v).trim();
  var m = s.match(/^(\d{4})[-\/.](\d{1,2})/);                 // YYYY-MM-DD
  if (m) return m[1] + '-' + String(m[2]).padStart(2, '0');
  m = s.match(/^(\d{1,2})[-\/.](\d{1,2})[-\/.](\d{4})/);      // DD.MM.YYYY
  if (m) return m[3] + '-' + String(m[2]).padStart(2, '0');
  return '';
}

function fmtTL(n) {
  return Math.round(n).toLocaleString('tr-TR') + '₺';
}
function fmtInt(n) { return Math.round(n).toLocaleString('tr-TR'); }
// Anlaşma başı ödeme = toplam sözleşme tutarı / anlaşma sayısı.
// Anlaşma 0 ise oran tanımsız → "—" (0'a bölme ve yanıltıcı ∞ gösterimi olmaz).
function perDeal(tutar, anlasma) {
  return anlasma > 0 ? fmtTL(tutar / anlasma) : '—';
}
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
  });
}

// Ham satır → normalize kayıt
function normalize(r) {
  return {
    mid: String(r['Müşteri İD'] == null ? '' : r['Müşteri İD']).trim().replace(/\.0+$/, ''),
    mad: String(r['Müşteri Adı'] || '').trim(),
    rci: String(r['RÇİ'] == null ? '' : r['RÇİ']).trim().replace(/\.0+$/, ''),
    rad: String(r['RÇİ Adı'] || '').trim(),
    ay: ayOf(r['Bitiş Tarihi']),
    bitis: String(r['Bitiş Tarihi'] || '').trim(),
    tutar: num(r['Satış Fiyatı']),
    anlasma: num(r['Anlaşma Sayısı']),
    kategori: String(r['Kategori Adı'] || '').trim(),
    sehir: String(r['Şehir'] || '').trim(),
    py: String(r['Sorumlu PY'] || '').trim()
  };
}

function filtered() {
  return MVP.rows.filter(function (r) {
    return !MVP.ay || r.ay === MVP.ay;
  });
}

function renderFilters() {
  var aylar = {};
  MVP.rows.forEach(function (r) { if (r.ay) aylar[r.ay] = (aylar[r.ay] || 0) + 1; });
  var keys = Object.keys(aylar).sort();
  var sel = document.getElementById('f-ay');
  var cur = MVP.ay;
  sel.innerHTML = '<option value="">Tüm aylar</option>' + keys.map(function (k) {
    return '<option value="' + k + '"' + (k === cur ? ' selected' : '') + '>' + k + ' (' + aylar[k] + ')</option>';
  }).join('');

  var noAy = MVP.rows.filter(function (r) { return !r.ay; }).length;
  document.getElementById('f-info').textContent = noAy ? (noAy + ' satırda bitiş tarihi okunamadı') : '';
}

function renderOzet() {
  var rows = filtered();
  var mus = {}, tutar = 0, anl = 0;
  rows.forEach(function (r) { if (r.mid) mus[r.mid] = 1; tutar += r.tutar; anl += r.anlasma; });
  var el = document.getElementById('b-ozet');
  if (!rows.length) { el.innerHTML = '<div class="empty">Seçime uyan kayıt yok</div>'; return; }
  el.innerHTML =
    '<div class="stat"><div class="v">' + fmtInt(rows.length) + '</div><div class="l">Aktif provider</div></div>' +
    '<div class="stat"><div class="v">' + fmtInt(Object.keys(mus).length) + '</div><div class="l">Müşteri</div></div>' +
    '<div class="stat"><div class="v">' + fmtTL(tutar) + '</div><div class="l">Toplam sözleşme tutarı</div></div>' +
    '<div class="stat"><div class="v">' + fmtInt(anl) + '</div><div class="l">Toplam anlaşma sayısı</div></div>' +
    '<div class="stat"><div class="v">' + fmtTL(rows.length ? tutar / rows.length : 0) + '</div><div class="l">Provider başı ort. tutar</div></div>';
  document.getElementById('ozet-note').textContent = MVP.ay ? ('bitiş ayı ' + MVP.ay) : 'tüm aylar';
}

function renderTop() {
  var rows = filtered();
  var el = document.getElementById('b-top');
  if (!rows.length) { el.innerHTML = '<div class="empty">Seçime uyan kayıt yok</div>'; return; }

  // MÜŞTERİ kırılımı: aynı Müşteri İD altındaki tüm providerlar toplanır.
  var by = {};
  rows.forEach(function (r) {
    var k = r.mid || ('ad:' + r.mad);
    if (!by[k]) by[k] = { mid: r.mid, ad: r.mad || r.rad || '(isimsiz)', tutar: 0, anl: 0, provs: [] };
    var c = by[k];
    c.tutar += r.tutar; c.anl += r.anlasma; c.provs.push(r);
    if (!c.ad && r.mad) c.ad = r.mad;
  });
  var list = Object.keys(by).map(function (k) { by[k].key = k; return by[k]; })
    .sort(function (a, b) { return b.tutar - a.tutar; }).slice(0, 20);

  var maxT = list.length ? list[0].tutar : 1;
  var h = '<table><thead><tr><th style="width:26px"></th><th>#</th><th>Müşteri</th><th class="num">Firma</th>' +
    '<th class="num">Toplam Tutar</th><th style="width:110px"></th><th class="num">Anlaşma</th>' +
    '<th class="num">Anlaşma Başı</th></tr></thead><tbody>';

  list.forEach(function (c, i) {
    var open = !!MVP.open[c.key];
    h += '<tr class="crow' + (open ? ' open' : '') + '" onclick="MVP.toggle(\'' + esc(c.key).replace(/'/g, "\\'") + '\')">' +
      '<td><span class="caret">' + (open ? '▾' : '▸') + '</span></td>' +
      '<td class="num">' + (i + 1) + '</td>' +
      '<td><b>' + esc(c.ad) + '</b>' + (c.mid ? ' <span class="note">#' + esc(c.mid) + '</span>' : '') + '</td>' +
      '<td class="num">' + c.provs.length + '</td>' +
      '<td class="num"><b>' + fmtTL(c.tutar) + '</b></td>' +
      '<td><span class="bar" style="width:' + Math.round((c.tutar / maxT) * 100) + 'px"></span></td>' +
      '<td class="num">' + fmtInt(c.anl) + '</td>' +
      '<td class="num"><b>' + perDeal(c.tutar, c.anl) + '</b></td></tr>';

    if (open) {
      var ps = c.provs.slice().sort(function (a, b) { return b.tutar - a.tutar; });
      h += '<tr><td colspan="8" class="sub-td"><table><thead><tr>' +
        '<th>RÇİ</th><th>Firma Adı</th><th>Kategori</th><th>Şehir</th><th>Sorumlu PY</th>' +
        '<th>Bitiş</th><th class="num">Tutar</th><th class="num">Anlaşma</th>' +
        '<th class="num">Anlaşma Başı</th></tr></thead><tbody>';
      ps.forEach(function (p) {
        h += '<tr><td>' + esc(p.rci) + '</td><td>' + esc(p.rad) + '</td><td>' + esc(p.kategori) + '</td>' +
          '<td>' + esc(p.sehir) + '</td><td>' + esc(p.py) + '</td><td>' + esc(p.ay || p.bitis) + '</td>' +
          '<td class="num">' + fmtTL(p.tutar) + '</td>' +
          '<td class="num">' + fmtInt(p.anlasma) + '</td>' +
          '<td class="num">' + perDeal(p.tutar, p.anlasma) + '</td></tr>';
      });
      h += '</tbody></table></td></tr>';
    }
  });
  h += '</tbody></table>';
  el.innerHTML = h;
}

function renderAll() { renderFilters(); renderOzet(); renderTop(); }

MVP.setAy = function (v) { MVP.ay = v || ''; MVP.open = {}; renderAll(); };
MVP.toggle = function (k) { MVP.open[k] = !MVP.open[k]; renderTop(); };

(function load() {
  fetch('/api/mvp-call-query/data', { credentials: 'same-origin' })
    .then(function (r) { return r.json(); })
    .then(function (d) {
      if (!d || d.ok === false) throw new Error(d && d.error ? d.error : 'Veri alınamadı');
      MVP.rows = (d.firma || []).map(normalize);
      document.getElementById('freshness').textContent =
        MVP.rows.length ? (fmtInt(MVP.rows.length) + ' aktif provider') :
        (d.missing ? 'Dashboard_Firma sekmesi henüz yazılmamış — Dashboard\u2019dan “Qlik\u2019ten yenile” çalıştırın' : 'Kayıt yok');
      renderAll();
    })
    .catch(function (e) {
      document.getElementById('freshness').textContent = 'Hata: ' + (e && e.message ? e.message : e);
      ['b-ozet', 'b-top'].forEach(function (id) {
        document.getElementById(id).innerHTML = '<div class="empty">Veri yüklenemedi</div>';
      });
    });
})();
</script>
</body>
</html>
