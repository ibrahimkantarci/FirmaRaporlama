<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mvp WP Call Query — Düğün.com</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8f9fb;color:#18181b;font-size:14px}
.topbar{background:#fff;border-bottom:1px solid #e4e4e7;padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.topbar h1{font-size:17px;font-weight:700;color:#0F766E}
.topbar .sub{font-size:12px;color:#a1a1aa}
.wrap{max-width:1100px;margin:0 auto;padding:20px 24px 60px}
.card{background:#fff;border:1px solid #e4e4e7;border-radius:12px;padding:18px;margin-bottom:16px}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.ct{font-size:14px;font-weight:700;color:#18181b}
.note{font-size:11px;color:#a1a1aa}
.row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.lbl{font-size:12px;width:110px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.track{flex:1;background:#f4f4f5;border-radius:5px;height:17px;overflow:hidden;position:relative}
.fill{height:100%;border-radius:5px;background:#0F766E;transition:width .3s}
.val{font-size:12px;font-weight:700;width:110px;text-align:right;color:#0F766E}
.stat-grid{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.stat{background:#f8fafc;border:1px solid #e4e4e7;border-radius:8px;padding:10px 16px;text-align:center;min-width:105px}
.stat .v{font-size:20px;font-weight:800;color:#0F766E}
.stat .l{font-size:10.5px;color:#71717a;margin-top:2px}
.chip{display:inline-flex;padding:4px 11px;border-radius:14px;font-size:11px;cursor:pointer;font-weight:600;background:#f4f4f5;color:#52525b;border:1px solid #e4e4e7;user-select:none}
.chip.on{background:#374151;color:#fff;border-color:#374151}
table{width:100%;border-collapse:collapse}
th{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:#71717a;text-align:left;padding:6px 8px;border-bottom:1px solid #e4e4e7}
td{padding:7px 8px;border-bottom:1px solid #f4f4f5;font-size:12.5px}
.empty{color:#a1a1aa;font-size:12px;padding:14px;text-align:center}
#toast{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#18181b;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:99}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.tab{flex:1;min-width:150px;background:#fff;border:1px solid #e4e4e7;border-radius:12px;padding:14px 12px;font-size:13.5px;font-weight:700;color:#52525b;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .15s;user-select:none;line-height:1.2}
.tab .ti{font-size:22px}
.tab:hover{border-color:#0F766E;color:#0F766E}
.tab.on{background:#0F766E;color:#fff;border-color:#0F766E;box-shadow:0 2px 10px rgba(15,118,110,.28)}
.tabpane{display:none}
.tabpane.on{display:block}
</style>
</head>
<body>
<div class="topbar">
  <h1>Mvp WP Call Query</h1>
  <span class="sub" id="freshness">Veri bekleniyor…</span>
</div>
<div class="wrap">

  <div class="card" style="padding:12px 18px">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span style="font-size:11px;font-weight:600;color:#71717a;text-transform:uppercase;letter-spacing:.5px">PY</span>
      <span id="f-py-chips"><span class="chip on">Tümü</span></span>
      <span style="font-size:11px;font-weight:600;color:#71717a;text-transform:uppercase;letter-spacing:.5px;margin-left:12px">Ay</span>
      <select id="f-ay" onchange="setMvpAy(this.value)" style="padding:5px 10px;border:1px solid #e4e4e7;border-radius:6px;font-size:12px;color:#374151;background:#fff;cursor:pointer">
        <option value="">Tüm aylar</option>
      </select>
      <span id="f-info" style="font-size:11px;color:#a1a1aa;margin-left:4px"></span>
    </div>
  </div>

  <div class="tabs" id="mvp-tabs">
    <div class="tab on" data-tab="sorgu" onclick="setMvpTab('sorgu')"><span class="ti">🔎</span>Sorgu</div>
  </div>

  <div class="tabpane on" id="pane-sorgu">
    <div class="card">
      <div class="card-head"><span class="ct">🔎 Mvp WP Call Query</span><span class="note">veri kaynağı henüz bağlanmadı</span></div>
      <div id="b-sorgu" class="empty">Veri bekleniyor</div>
    </div>
  </div>

</div>
<div id="toast"></div>
<script>
var MVP_STATE = { py: '', ay: '' };

function setMvpTab(name){
  var tabs=document.querySelectorAll('#mvp-tabs .tab');
  for(var i=0;i<tabs.length;i++){ tabs[i].classList.toggle('on', tabs[i].getAttribute('data-tab')===name); }
  var keys=['sorgu'];
  for(var j=0;j<keys.length;j++){ var p=document.getElementById('pane-'+keys[j]); if(p) p.classList.toggle('on', keys[j]===name); }
}

function setMvpAy(v){
  MVP_STATE.ay = v || '';
  if (typeof window.renderMvp === 'function') window.renderMvp();
}

function setMvpPy(v){
  MVP_STATE.py = v || '';
  if (typeof window.renderMvp === 'function') window.renderMvp();
}
</script>
</body>
</html>
